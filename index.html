<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易者工具箱</title>
    <style>
        :root {
            --up-red: #F6465D; --down-green: #0ECB81;
            --bg-dark: #0b0e11; --card-bg: #1e2329; --input-bg: #2b3139;
            --text-main: #eaecef; --text-muted: #848e9c; --border-color: #2b3139;
        }
        body { font-family: "DIN Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .main-layout { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 30px; width: 100%; max-width: 1200px; flex-wrap: wrap; }
        .container { flex: 1 1 450px; max-width: 550px; background: var(--card-bg); padding: 35px 30px; border-radius: 12px; border: 1px solid var(--border-color); }
        
        h2 { text-align: center; color: var(--text-main); margin-top: 0; margin-bottom: 30px; font-weight: 700; font-size: 20px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h2::before { content: ''; display: inline-block; width: 8px; height: 22px; background: var(--up-red); border-radius: 2px; }
        h2::after { content: ''; display: inline-block; width: 8px; height: 22px; background: var(--down-green); border-radius: 2px; }

        /* 核心布局：确保行对齐 */
        .row-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 10px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 15px; background-color: var(--input-bg); color: var(--text-main); }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; letter-spacing: 2px; color: white; }
        .btn-red { background-color: var(--up-red); }
        .btn-green { background-color: var(--down-green); }
        .btn-secondary { background-color: var(--input-bg); border: 1px dashed var(--text-muted); color: var(--text-main); margin-top: 10px; }
        .btn-delete { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 12px; width: 42px; }
        
        .result-box { margin-top: 20px; }
        .summary-card { background: var(--input-bg); padding: 15px; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <h2>复利仓位模型</h2>
        <div style="display:block">
            <div class="input-group"><label>初始本金</label><input type="number" id="principal" placeholder="例如: 10000"></div>
            <div class="input-group" style="margin-top:15px"><label>单次仓位</label><input type="number" id="position" placeholder="例如: 100"></div>
            <div class="input-group" style="margin-top:15px"><label>单次收益率</label><input type="number" id="profit" placeholder="例如: 5"></div>
            <div class="input-group" style="margin-top:15px"><label>目标倍数</label><input type="number" id="targetTimes" placeholder="例如: 2"></div>
        </div>
        <button class="btn-red" onclick="alert('功能待对接')">计算复利计划</button>
    </div>

    <div class="container">
        <h2>持仓均价计算器</h2>
        <div id="positionList">
            <div class="row-grid">
                <div class="input-group"><label>买入价格 (首仓)</label><input type="number" class="pos-price" placeholder="10.5"></div>
                <div class="input-group"><label>买入数量</label><input type="number" class="pos-qty" placeholder="1000"></div>
                <button class="btn-delete" style="visibility:hidden">✕</button>
            </div>
        </div>
        <button class="btn-secondary" onclick="addRow()">+ 增加一笔补仓/加仓</button>
        <button class="btn-green" onclick="calculateAvg()">计算持仓成本</button>
        <div class="result-box" id="avgResultBox">
            <div class="summary-card"><p>点击计算获取结果</p></div>
        </div>
    </div>
</div>

<footer style="text-align: center; margin-top: 50px;">
    <a href="https://t.me/xjpccb" target="_blank" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">@xjpccb</a>
</footer>

<script>
function addRow() {
    const div = document.createElement('div'); 
    div.className = 'row-grid';
    div.innerHTML = `
        <div class="input-group"><input type="number" class="pos-price" placeholder="价格"></div>
        <div class="input-group"><input type="number" class="pos-qty" placeholder="数量"></div>
        <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
    `;
    document.getElementById('positionList').appendChild(div);
}
function calculateAvg() {
    let cost = 0, qty = 0;
    document.querySelectorAll('.row-grid').forEach(row => {
        let p = parseFloat(row.querySelector('.pos-price').value);
        let q = parseFloat(row.querySelector('.pos-qty').value);
        if(p && q) { cost += p*q; qty += q; }
    });
    if(qty === 0) { alert("请输入有效数据"); return; }
    document.getElementById('avgResultBox').innerHTML = `<div class="summary-card"><h4>持仓均价: ${(cost/qty).toFixed(4)}</h4></div>`;
}
</script>
</body>
</html>
